name: wb

services:
  database:
    image: postgres:16
    restart: always
    env_file:
      - .env
    volumes:
      - data:/var/lib/postgresql/data
      - ./dumps:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT}:5432"
    networks:
      - wb_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"yellow\\|green\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wb_network

  api:
    build: .
    env_file:
      - .env
    environment:
      DB_HOST: database
      ELASTICSEARCH_HOST: http://elasticsearch:9200
    volumes:
      - .:/app
    depends_on:
      database:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    command: python -m uvicorn core.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    networks:
      - wb_network

  keycloak-db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${KC_DB_NAME}
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    ports:
      - "${KC_DB_PORT}:5432"
    networks:
      - wb_network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    restart: always
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KEYCLOAK_ADMIN: ${KC_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    command: start-dev --import-realm
    volumes:
      - ./keycloak/wb-realm-realm.json:/opt/keycloak/data/import/wb-realm-realm.json:ro
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - wb_network

  keycloak-setup:
    image: curlimages/curl:latest
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - wb_network
    environment:
      KC_ADMIN_USERNAME: ${KC_ADMIN_USERNAME}
      KC_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Waiting for Keycloak to be fully ready..."
        sleep 5

        echo "Getting admin token..."
        ADMIN_TOKEN=$$(curl -s -X POST http://keycloak:8080/realms/master/protocol/openid-connect/token \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "client_id=admin-cli" \
          -d "username=$${KC_ADMIN_USERNAME}" \
          -d "password=$${KC_ADMIN_PASSWORD}" \
          -d "grant_type=password" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')

        if [ -z "$$ADMIN_TOKEN" ]; then
          echo "ERROR: Failed to get admin token"
          exit 1
        fi

        echo "Admin token obtained"

        echo "Getting realm public key..."
        PUBLIC_KEY=$$(curl -s -X GET http://keycloak:8080/realms/wb-realm | sed -n 's/.*"public_key":"\([^"]*\)".*/\1/p')

        echo "Getting Client Secret..."
        CLIENT_ID_UUID=$$(curl -s -X GET http://keycloak:8080/admin/realms/wb-realm/clients \
          -H "Authorization: Bearer $$ADMIN_TOKEN" | sed -n 's/.*"id":"\([^"]*\)".*"clientId":"wb-client".*/\1/p' | head -1)

        if [ -n "$$CLIENT_ID_UUID" ]; then
          CLIENT_SECRET=$$(curl -s -X GET "http://keycloak:8080/admin/realms/wb-realm/clients/$$CLIENT_ID_UUID/client-secret" \
            -H "Authorization: Bearer $$ADMIN_TOKEN" | sed -n 's/.*"value":"\([^"]*\)".*/\1/p')

          if [ -n "$$CLIENT_SECRET" ] && [ -n "$$PUBLIC_KEY" ]; then
            echo ""
            echo "================================================================"
            echo "Keycloak setup completed successfully!"
            echo "================================================================"
            echo ""
            echo "Add/Update these values in your .env file:"
            echo "KEYCLOAK_CLIENT_SECRET=$$CLIENT_SECRET"
            echo "KEYCLOAK_PUBLIC_KEY=$$PUBLIC_KEY"
            echo ""
            echo "Test users:"
            echo "  Username: petrov.av    | Password: password3"
            echo "  Username: ivanov.ii    | Password: password"
            echo ""
            echo "================================================================"
          fi
        fi

volumes:
  data:
    driver: local
  elasticsearch_data:
    driver: local
  keycloak_db_data:
    driver: local

networks:
  wb_network:
    driver: bridge